kind = "web"
previewPath = "/"
title = "Arch Linux - Livro Completo"
version = "1.0.0"
id = "artifacts/arch-linux-book"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24541

[services.development]
run = "pnpm --filter @workspace/arch-linux-book run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arch-linux-book", "run", "build" ]
publicDir = "artifacts/arch-linux-book/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24541"
BASE_PATH = "/"
