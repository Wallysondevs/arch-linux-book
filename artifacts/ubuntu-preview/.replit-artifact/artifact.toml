kind = "web"
previewPath = "/ubuntu-preview/"
title = "Ubuntu Book - Preview"
version = "1.0.0"
id = "artifacts/ubuntu-preview"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/ubuntu-preview/" ]
localPort = 20500

[services.development]
run = "pnpm --filter @workspace/ubuntu-preview run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ubuntu-preview", "run", "build" ]
publicDir = "artifacts/ubuntu-preview/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20500"
BASE_PATH = "/ubuntu-preview/"
